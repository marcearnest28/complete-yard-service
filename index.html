<!DOCTYPE html>
<html>
<head>
  <title>Complete Yard Service LLC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #2e7d32;
      color: white;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: white;
    }

    .header img {
      height: 60px;
    }

    .menu {
      font-size: 28px;
      color: black;
    }

    /* HERO */
    .hero {
      background: url('https://images.unsplash.com/photo-1598514982881-6c1d8c4cfd0b') center/cover no-repeat;
      height: 85vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
      background-color: rgba(0,0,0,0.5);
      background-blend-mode: darken;
    }

    .hero h1 {
      font-size: 36px;
      max-width: 300px;
    }

    .hero p {
      font-size: 18px;
    }

    .hero button {
      margin-top: 20px;
      padding: 15px;
      background: #00c853;
      color: white;
      border: none;
      font-size: 16px;
    }

    /* SERVICES */
    .services {
      padding: 30px 20px;
      background: white;
      color: black;
    }

    .services h2 {
      text-align: center;
    }

    .service {
      margin: 20px 0;
      position: relative;
    }

    .service img {
      width: 100%;
      border-radius: 5px;
    }

    .service-text {
      position: absolute;
      bottom: 10px;
      left: 15px;
      color: white;
      font-size: 22px;
      font-weight: bold;
    }

    /* CONTACT */
    .contact {
      text-align: center;
      padding: 30px;
    }

    .contact button {
      margin-top: 15px;
      padding: 15px;
      background: black;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.jpg">
  <div class="menu">☰</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Local People. Great Service.</h1>
  <p>Complete Yard Service LLC</p>
  <button onclick="window.location.href='tel:8504472714'">
    Call Now
  </button>
</div>

<!-- SERVICES -->
<div class="services">
  <h2>Our Services</h2>

  <div class="service">
    <img src="https://images.unsplash.com/photo-1591824438708-ce405f36ba3d">
    <div class="service-text">Lawn Care</div>
  </div>

  <div class="service">
    <img src="https://images.unsplash.com/photo-1560749003-f4b1e17e2f6c">
    <div class="service-text">Yard Cleanup</div>
  </div>

  <div class="service">
    <img src="https://images.unsplash.com/photo-1625246333195-78d9c38ad449">
    <div class="service-text">Pressure Washing</div>
  </div>

</div>

<!-- CONTACT -->
<div class="contact">
  <h2>Call for Free Estimates</h2>
  <p>Chris: 850-447-2714</p>
  <p>Tommy: 850-447-1875</p>

  <button onclick="window.location.href='tel:8504472714'">
    Contact Us
  </button>
</div>

</body>
</html>
